name: Release

on:
  push:
    tags: ["*"]
    branches: [main]
    paths:
      - gradle.properties
      - build.gradle.kts
      - settings.gradle.kts
      - crisp-api/**
      - crisp-server/**
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (omit to auto-number)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Resolve build metadata
        id: meta
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            mc_version="$(grep '^mcVersion=' gradle.properties | cut -d= -f2)"
            tag="${mc_version}-${{ github.run_number }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace
      - name: Build paperclip jar
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew createPaperclipJar --stacktrace
      - name: Collect jar
        id: jar
        run: |
          src="$(find crisp-server/build/libs -name '*paperclip*.jar' | head -1)"
          out="crisp-${{ steps.meta.outputs.tag }}.jar"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Crisp ${{ steps.meta.outputs.tag }}
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
