name: Update upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Resolve latest published Paper build commit
        id: paper
        run: |
          mc_version="$(grep '^mcVersion=' gradle.properties | cut -d= -f2)"
          # Prefer STABLE builds; fall back to BETA until a stable build exists for this version.
          latest=""
          for channel in STABLE BETA; do
            latest="$(curl -sf "https://fill.papermc.io/v3/projects/paper/versions/${mc_version}/builds?channel=${channel}" \
              | jq -r 'map(select(.commits | length > 0)) | first | .commits[0].sha // empty')"
            if [ -n "$latest" ]; then
              echo "Tracking latest ${channel} build commit for ${mc_version}: ${latest}"
              break
            fi
          done
          if [ -z "$latest" ]; then
            echo "No published builds found for ${mc_version}" >&2
            exit 1
          fi
          current="$(grep '^paperRef=' gradle.properties | cut -d= -f2)"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
      - name: Bump and rebuild patches
        if: steps.paper.outputs.latest != steps.paper.outputs.current
        run: |
          sed -i "s/^paperRef=.*/paperRef=${{ steps.paper.outputs.latest }}/" gradle.properties
          ./gradlew applyAllPatches --stacktrace
          ./gradlew rebuildPaperPatches crisp-server:rebuildAllServerPatches --stacktrace
      - name: Commit upstream bump to main
        if: steps.paper.outputs.latest != steps.paper.outputs.current
        run: |
          git add -A
          git commit -m "Update upstream Paper to ${{ steps.paper.outputs.latest }}"
          git push origin HEAD:main
