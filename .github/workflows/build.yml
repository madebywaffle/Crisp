name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    if: github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace
      # Fails when upstream adds a brain mob that DAB does not gate yet,
      # so coverage gaps surface on the daily upstream bump instead of silently shipping.
      - name: Check DAB brain coverage
        run: |
          ungated=0
          while IFS= read -r match; do
            file="${match%%:*}"
            line="${match#*:}"; line="${line%%:*}"
            prev="$(sed -n "$((line - 1))p" "$file")"
            if [[ "$prev" != *"behaviorTick"* ]]; then
              echo "::error file=$file,line=$line::brain tick without DAB gate"
              ungated=$((ungated + 1))
            fi
          done < <(grep -rn "getBrain().tick(level, this);\|brain.tick(level, this);" \
            crisp-server/src/minecraft/java/net/minecraft/world/entity --include="*.java")
          if [ "$ungated" -gt 0 ]; then
            echo "$ungated ungated brain tick site(s) found - extend the DAB patches"
            exit 1
          fi
          echo "all brain tick sites gated"
      - name: Build
        run: ./gradlew build --stacktrace
